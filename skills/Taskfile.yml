version: '3'

tasks:
  check:
    desc: Lint Python scripts
    cmds:
      - uvx ruff check --verbose .

  fix:
    desc: Fix Python scripts
    cmds:
      - uvx ruff check --fix --verbose .
      - uvx ruff format .

  shell:check:
    desc: Lint shell scripts
    cmds:
      - 'git ls-files -z "*.sh" | xargs -0r shellcheck --rcfile .shellcheckrc'
