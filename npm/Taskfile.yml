version: '3'

tasks:
  install:
    desc: Install npm dependencies
    cmds:
      - pnpm install
    if: '[ -n "$CI" ]'

  check:
    desc: Run lint and type check
    cmds:
      - task: install
      - pnpm check

  fix:
    desc: Fix lint problems
    cmds:
      - pnpm fix

  publish:
    desc: Publish a package
    cmds:
      - pnpm publish --filter {{.PACKAGE}} --no-git-checks