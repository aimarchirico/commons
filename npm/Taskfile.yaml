version: '3'

tasks:
  install:
    internal: true
    desc: Install NPM dependencies
    cmds:
      - pnpm install
    if: '[ -n "$CI" ]'

  check:
    desc: Check TypeScript files
    cmds:
      - task: install
      - pnpm check

  fix:
    desc: Fix TypeScript files
    cmds:
      - pnpm fix

  publish:
    desc: Publish an NPM package
    cmds:
      - task: install
      - pnpm publish --filter {{.PACKAGE}} --no-git-checks
