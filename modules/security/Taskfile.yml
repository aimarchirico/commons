version: '3'

tasks:
  build:
    desc: Build security library module
    cmds:
      - bash ../gradlew :security:build
  check:
    desc: Run tests and quality checks for security module
    cmds:
      - bash ../gradlew :security:check
  fix:
    desc: Format security module code
    cmds:
      - bash ../gradlew :security:ktfmtFormat
