version: 2
registries:
  github-maven:
    type: maven-repository
    url: https://maven.pkg.github.com/aimarchirico/commons
    username: x-access-token
    password: ${{secrets.GH_PACKAGES_TOKEN}}

  github-npm:
    type: npm-registry
    url: https://npm.pkg.github.com
    scope: '@aimarchirico'
    token: ${{secrets.GH_PACKAGES_TOKEN}}

  github-npm-google-signin:
    type: npm-registry
    url: https://npm.pkg.github.com
    scope: '@react-native-google-signin'
    token: ${{secrets.GH_PACKAGES_TOKEN}}

updates:
  - package-ecosystem: 'github-actions'
    directory: '/.github'
    schedule:
      interval: 'weekly'
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: 'gradle'
    directory: '/maven'
    registries:
      - github-maven
    schedule:
      interval: 'weekly'
    groups:
      gradle-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: 'npm'
    directory: ["/npm", "/tools"]
    registries:
      - github-npm
      - github-npm-google-signin
    schedule:
      interval: 'weekly'
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    cooldown:
      default-days: 1
