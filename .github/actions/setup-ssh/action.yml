name: Set Up SSH
description: Configure an SSH key and known_hosts entry for a remote host
inputs:
  ssh-key:
    description: Private SSH key used to authenticate with the host
    required: true
  host:
    description: Remote host to add to known_hosts
    required: true
runs:
  using: composite
  steps:
    - name: Set Up SSH
      shell: bash
      run: |
        mkdir -p ~/.ssh
        echo "${{ inputs.ssh-key }}" > ~/.ssh/key
        chmod 600 ~/.ssh/key
        ssh-keyscan -H ${{ inputs.host }} >> ~/.ssh/known_hosts
