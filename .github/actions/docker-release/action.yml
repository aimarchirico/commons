name: Docker Release
description: Build and push a multi-arch Docker image to GHCR, tagged with a version and latest
inputs:
  image:
    description: Fully qualified image name (without tag)
    required: true
  context:
    description: Build context directory
    required: true
  version:
    description: Version to tag the image with
    required: true
  github-actor:
    description: Actor used for registry login and the GITHUB_ACTOR build arg
    required: true
  github-token:
    description: Token used to authenticate with the container registry
    required: true
  gh-packages-token:
    description: Token exposed to the build as the gh_packages_token secret
    required: true
runs:
  using: composite
  steps:
    - name: Log In to Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ inputs.github-actor }}
        password: ${{ inputs.github-token }}

    - name: Extract Metadata and Create Tags
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ inputs.image }}
        tags: |
          type=raw,value=${{ inputs.version }}
          type=raw,value=latest

    - name: Set Up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.context }}
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          GITHUB_ACTOR=${{ inputs.github-actor }}
        secrets: |
          gh_packages_token=${{ inputs.gh-packages-token }}
