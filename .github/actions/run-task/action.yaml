name: Run Task
description: Set up Task and run a command with optional env
inputs:
  command:
    required: true
  working_directory:
    required: false
    default: '.'
  task_env:
    required: false

runs:
  using: 'composite'
  steps:
    - name: Set Up Task
      uses: arduino/setup-task@v2
      with:
        version: 3.x
    - name: Run Task
      working-directory: ${{ inputs.working_directory }}
      shell: bash
      run: |
        if [ -n "${{ inputs.task_env }}" ]; then
          set -a
          source <(echo "${{ inputs.task_env }}")
          set +a
        fi
        task ${{ inputs.command }}
