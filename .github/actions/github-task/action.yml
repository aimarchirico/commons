name: GitHub Task
description: Run GitHub Actions CI Task
inputs:
  command:
    required: true
  working_directory:
    required: false
    default: '.'
  task_env:
    required: false

runs:
  using: 'composite'
  steps:
    - name: Install Actionlint
      shell: bash
      run: |
        bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        sudo mv actionlint /usr/local/bin/
    - name: Set Up Task
      uses: arduino/setup-task@v2
      with:
        version: 3.x
    - name: Run Task
      working-directory: ${{ inputs.working_directory }}
      shell: bash
      run: |
        if [ -n "${{ inputs.task_env }}" ]; then
          echo "${{ inputs.task_env }}" > .env.temp
          set -a
          source .env.temp
          set +a
          rm -f .env.temp
        fi
        task ${{ inputs.command }}
