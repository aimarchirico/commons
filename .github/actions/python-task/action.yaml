name: Python Task
description: Run Python CI Task
inputs:
  command:
    required: true
  working_directory:
    required: false
    default: '.'
  task_env:
    required: false

runs:
  using: 'composite'
  steps:
    - name: Set Up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Set Up Task
      uses: arduino/setup-task@v2
      with:
        version: 3.x
    - name: Run Task
      working-directory: ${{ inputs.working_directory }}
      shell: bash
      run: |
        if [ -n "${{ inputs.task_env }}" ]; then
          echo "${{ inputs.task_env }}" > .env.temp
          set -a
          source .env.temp
          set +a
          rm -f .env.temp
        fi
        task ${{ inputs.command }}
