name: Set Up Android
description: Set up the JDK toolchains required for Android release builds
runs:
  using: composite
  steps:
    - name: Set Up Java
      uses: aimarchirico/commons/.github/actions/setup-java@main

    - name: JDK 17 for Android Native Build
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '17'
