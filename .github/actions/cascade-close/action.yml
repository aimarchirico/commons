name: Cascade Close Sub-Issues
description: Close every sub-issue of a closed issue, descending through nested sub-issues
inputs:
  token:
    description: Token used to read and close sub-issues (needs issues:write)
    required: false
    default: ${{ github.token }}
runs:
  using: composite
  steps:
    - name: Close sub-issues
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.token }}
        script: |
          // Breadth-first walk of the sub-issue tree. A single run closes the
          // whole tree because the default GITHUB_TOKEN cannot trigger the
          // downstream workflow runs that closing each child would otherwise fire.
          const queue = [context.payload.issue.number];
          while (queue.length) {
            const issue_number = queue.shift();
            const subIssues = await github.paginate(
              "GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues",
              { ...context.repo, issue_number, per_page: 100 }
            );
            for (const sub of subIssues) {
              if (sub.state === "open") {
                await github.rest.issues.update({
                  ...context.repo,
                  issue_number: sub.number,
                  state: "closed",
                });
                core.info(`Closed sub-issue #${sub.number}`);
              }
              queue.push(sub.number);
            }
          }
