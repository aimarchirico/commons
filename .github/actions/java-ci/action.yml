name: Java CI
description: Run Java CI Task
inputs:
  command:
    required: true
  working_directory:
    required: false
    default: '.'
  TASK_ENV:
    required: false

runs:
  using: "composite"
  steps:
    - name: Set Up Java
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 25
        cache: gradle
    - name: Set Up Task
      uses: arduino/setup-task@v2
      with:
        version: 3.x
    - name: Run Task
      working-directory: ${{ inputs.working_directory }}
      shell: bash
      run: |
        if [ -n "${{ inputs.TASK_ENV }}" ]; then
          echo "${{ inputs.TASK_ENV }}" > .env.temp
          source .env.temp
        fi
        task ${{ inputs.command }}
