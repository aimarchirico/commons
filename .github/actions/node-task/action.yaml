name: Node Task
description: Run Node CI Task
inputs:
  command:
    required: true
  node_cache_path:
    required: false
    default: 'pnpm-lock.yaml'
  working_directory:
    required: false
    default: '.'
  task_env:
    required: false

runs:
  using: 'composite'
  steps:
    - name: Set Up PNPM
      uses: pnpm/action-setup@v4
      with:
        version: 11.9.0
    - name: Set Up Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm
        cache-dependency-path: ${{ inputs.node_cache_path }}
        registry-url: https://npm.pkg.github.com
    - name: Set Up Task
      uses: arduino/setup-task@v2
      with:
        version: 3.51.1
    - name: Run Task
      working-directory: ${{ inputs.working_directory }}
      shell: bash
      run: |
        if [ -n "${{ inputs.task_env }}" ]; then
          echo "${{ inputs.task_env }}" > .env.temp
          set -a
          source .env.temp
          set +a
          rm -f .env.temp
        fi
        task ${{ inputs.command }}
