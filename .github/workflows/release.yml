    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'maven/commons-firebase-admin')
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set Up Java
        uses: ./.github/actions/setup-java

      - name: Publish Module
        env:
          MODULE: commons-firebase-admin
        run: task maven:publish

  # ==========================================
  # NPM MODULES
  # ==========================================
  publish-commons-ts:
    name: Publish commons-ts
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-ts')
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set Up Node
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: npm/pnpm-lock.yaml

      - name: Install Dependencies
        run: task npm:install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Publish Package
        run: task npm:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE: '@aimarchirico/commons-ts'

