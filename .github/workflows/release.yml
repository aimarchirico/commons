name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  # ==========================================
  # RELEASE PLEASE
  # ==========================================
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: tools/release-please-config.json
          manifest-file: tools/.release-please-manifest.json

  # ==========================================
  # MAVEN MODULES
  # ==========================================
  publish-commons-security:
    name: Publish commons-security
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'maven/commons-security')
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set Up Java
        uses: ./.github/actions/setup-java

      - name: Publish Module
        env:
          MODULE: commons-security
        run: task maven:publish

  # ==========================================
  # MAVEN MODULES
  # ==========================================
  publish-commons-test:
    name: Publish commons-test
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'maven/commons-test')
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set Up Java
        uses: ./.github/actions/setup-java

      - name: Publish Module
        env:
          MODULE: commons-test
        run: task maven:publish

  # ==========================================
  # MAVEN MODULES
  # ==========================================
  publish-commons-convention:
    name: Publish commons-convention
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'maven/commons-convention')
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set Up Java
        uses: ./.github/actions/setup-java

      - name: Publish Module
        env:
          MODULE: commons-convention
