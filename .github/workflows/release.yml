name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write
  deployments: write

jobs:
  # ==========================================
  # RELEASE PLEASE
  # ==========================================
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: tools/release-please-config.json
          manifest-file: tools/.release-please-manifest.json

  # ==========================================
  # MAVEN MODULES
  # ==========================================
  publish-commons-maven:
    name: Publish commons-firebase-admin
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'maven/commons-firebase-admin')
    uses: ./.github/workflows/java-ci.yml
    with:
      command: maven:publish
    secrets:
      TASK_ENV: |
        MODULE=commons-firebase-admin

  # ==========================================
  # NPM MODULES
  # ==========================================
  publish-commons-ts:
    name: Publish commons-ts
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-ts')
    uses: ./.github/workflows/node-ci.yml
    with:
      command: npm:publish
      node_cache_path: npm/pnpm-lock.yaml
    secrets:
      TASK_ENV: |
        NODE_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
        PACKAGE='@aimarchirico/commons-ts'

  publish-commons-expo:
    name: Publish commons-expo
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-expo')
    uses: ./.github/workflows/node-ci.yml
    with:
      command: npm:publish
      node_cache_path: npm/pnpm-lock.yaml
    secrets:
      TASK_ENV: |
        NODE_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
        PACKAGE='@aimarchirico/commons-expo'

  publish-commons-openapi:
    name: Publish commons-openapi
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-openapi')
    uses: ./.github/workflows/node-ci.yml
    with:
      command: npm:publish
      node_cache_path: npm/pnpm-lock.yaml
    secrets:
      TASK_ENV: |
        NODE_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
        PACKAGE='@aimarchirico/commons-openapi'

  publish-commons-tools:
    name: Publish commons-tools
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-tools')
    uses: ./.github/workflows/node-ci.yml
    with:
      command: npm:publish
      node_cache_path: npm/pnpm-lock.yaml
    secrets:
      TASK_ENV: |
        NODE_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
        PACKAGE='@aimarchirico/commons-tools'

  publish-commons-docs:
    name: Publish commons-docs
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-docs')
    uses: ./.github/workflows/node-ci.yml
    with:
      command: npm:publish
      node_cache_path: npm/pnpm-lock.yaml
    secrets:
      TASK_ENV: |
        NODE_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
        PACKAGE='@aimarchirico/commons-docs'

  publish-commons-cloudflare:
    name: Publish commons-cloudflare
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-cloudflare')
    uses: ./.github/workflows/node-ci.yml
    with:
      command: npm:publish
      node_cache_path: npm/pnpm-lock.yaml
    secrets:
      TASK_ENV: |
        NODE_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
        PACKAGE='@aimarchirico/commons-cloudflare'

  publish-commons-firebase-client:
    name: Publish commons-firebase-client
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-firebase-client')
    uses: ./.github/workflows/node-ci.yml
    with:
      command: npm:publish
      node_cache_path: npm/pnpm-lock.yaml
    secrets:
      TASK_ENV: |
        NODE_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
        PACKAGE='@aimarchirico/commons-firebase-client'

  publish-commons-google-signin:
    name: Publish commons-google-signin
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-google-signin')
