name: Docs - CI

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths:
      - "**/*.md"
      - ".github/workflows/docs-ci.yml"
      - "Taskfile.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main, dev]
    paths:
      - "**/*.md"
      - ".github/workflows/docs-ci.yml"
      - "Taskfile.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  check:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint Markdown
        run: npx markdownlint-cli2
