name: Cloudflare Deploy

on:
  workflow_call:
    inputs:
      build_env:
        description: 'Environment variables to inject before build'
        type: string
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: web-production
      url: ${{ vars.APP_URL }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: aimarchirico/commons/.github/actions/setup-node@main
        with:
          cache-dependency-path: ./frontend/pnpm-lock.yaml

      - name: Build for Web
        working-directory: ./frontend
        run: |
          echo "${{ inputs.build_env }}" > .env.temp
          source .env.temp
          task build:web

      - name: Publish to Cloudflare Pages
        working-directory: ./frontend
        run: npx wrangler pages deploy ./apps/expo/dist --project-name=${{ github.event.repository.name }} --branch=main
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
