name: Close Sub-Issues

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  # ==========================================
  # CASCADE CLOSE
  # ==========================================
  cascade:
    name: Close Sub-Issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/close-issues
