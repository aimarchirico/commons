name: Java CI

on:
  workflow_call:
    inputs:
      command:
        type: string
        required: true
      working_directory:
        type: string
        default: '.'
    secrets:
      TASK_ENV:
        required: false

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Set Up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Run Task
        working-directory: ${{ inputs.working_directory }}
        run: |
          if [ -n "${{ secrets.TASK_ENV }}" ]; then
            echo "${{ secrets.TASK_ENV }}" > .env.temp
            source .env.temp
          fi
          task ${{ inputs.command }}
