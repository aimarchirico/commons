name: CI

on:
  pull_request:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ==========================================
  # PATH FILTERING
  # ==========================================
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      maven: ${{ steps.filter.outputs.maven }}
      npm: ${{ steps.filter.outputs.npm }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Detect Changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            maven:
              - 'maven/**'
              - '.github/workflows/ci.yml'
            npm:
              - 'npm/**'
              - '.github/workflows/ci.yml'
            docs:
              - '**/*.md'
              - '.github/workflows/ci.yml'

  # ==========================================
  # MAVEN CI JOB
  # ==========================================
  maven:
    name: Maven Check
    needs: changes
    if: needs.changes.outputs.maven == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/java-ci
        with:
          command: maven:check

  # ==========================================
  # NPM CI JOB
  # ==========================================
  npm:
    name: NPM Check
    needs: changes
    if: needs.changes.outputs.npm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/node-ci
        with:
          command: npm:check
          node_cache_path: npm/pnpm-lock.yaml
          TASK_ENV: |
            NODE_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}

  # ==========================================
  # COMMIT CI JOB
  # ==========================================
  commitlint:
    name: Commit Check
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/node-ci
        with:
          command: commit:check
          node_cache_path: tools/pnpm-lock.yaml
          TASK_ENV: |
            NODE_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
            FROM_SHA=${{ github.event.pull_request.base.sha }}
            TO_SHA=${{ github.event.pull_request.head.sha }}

  # ==========================================
  # DOCUMENTATION CI JOB
  # ==========================================
  docs:
    name: Docs Check
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/node-ci
        with:
          command: docs:check
          node_cache_path: tools/pnpm-lock.yaml
          TASK_ENV: |
            NODE_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
