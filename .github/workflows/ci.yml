name: CI

on:
  workflow_dispatch:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # PATH FILTERING
  # ==========================================
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.filter.outputs.modules }}
      packages: ${{ steps.filter.outputs.packages }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Detect Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            modules:
              - 'modules/**'
              - '.github/workflows/ci.yml'
            packages:
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            docs:
              - '**/*.md'
              - '.github/workflows/ci.yml'

  # ==========================================
  # MODULES CI JOB (JAVA / GRADLE / KOTLIN)
  # ==========================================
  modules:
    name: JVM Modules Check
    needs: changes
    if: needs.changes.outputs.modules == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Set Up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Run JVM Checks
        run: task check:modules

  # ==========================================
  # PACKAGES CI JOB (NODE / ESLINT / TSC)
  # ==========================================
  packages:
    name: NPM Packages Check
    needs: changes
    if: needs.changes.outputs.packages == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set Up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install Dependencies
        run: npm ci

      - name: Run Package Checks
        run: task check:packages

  # ==========================================
  # DOCUMENTATION CI JOB (LINT)
  # ==========================================
  docs:
    name: Docs Check
    needs: changes
    # Only run standalone if code changes aren't already triggering full checks
    if: needs.changes.outputs.docs == 'true' && needs.changes.outputs.modules != 'true' && needs.changes.outputs.packages != 'true' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set Up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install Dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Docs Checks
        run: task check:docs
