name: CI

on:
  pull_request:
    branches: [dev, main]

permissions:
  contents: read
  pull-requests: read

jobs:
  # ==========================================
  # PATH FILTERING
  # ==========================================
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      maven: ${{ steps.filter.outputs.maven }}
      npm: ${{ steps.filter.outputs.npm }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Detect Changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            maven:
              - 'maven/**'
              - '.github/workflows/ci.yml'
            npm:
              - 'npm/**'
              - '.github/workflows/ci.yml'
            docs:
              - '**/*.md'
              - '.github/workflows/ci.yml'

  # ==========================================
  # MAVEN CI JOB
  # ==========================================
  maven:
    name: Maven Check
    needs: changes
    if: needs.changes.outputs.maven == 'true'
    uses: ./.github/workflows/java-ci.yml
    with:
      command: maven:check

  # ==========================================
  # NPM CI JOB
  # ==========================================
  npm:
    name: NPM Check
    needs: changes
    if: needs.changes.outputs.npm == 'true'
    uses: ./.github/workflows/node-ci.yml
    with:
      command: npm:check
      node_cache_path: npm/pnpm-lock.yaml
    secrets:
      TASK_ENV: |
        NODE_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}

  # ==========================================
  # COMMIT CI JOB
  # ==========================================
  commitlint:
    name: Commit Check
    if: github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/node-ci.yml
    with:
      command: commit:check
      node_cache_path: tools/pnpm-lock.yaml
    secrets:
      TASK_ENV: |
        NODE_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
        FROM_SHA=${{ github.event.pull_request.base.sha }}
        TO_SHA=${{ github.event.pull_request.head.sha }}

  # ==========================================
  # DOCUMENTATION CI JOB
  # ==========================================
  docs:
    name: Docs Check
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    uses: ./.github/workflows/node-ci.yml
    with:
      command: docs:check
      node_cache_path: tools/pnpm-lock.yaml
    secrets:
      TASK_ENV: |
        NODE_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
