name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  packages: write
  deployments: write

jobs:
  # ==========================================
  # RELEASE PLEASE
  # ==========================================
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: tools/release-please-config.json
          manifest-file: tools/.release-please-manifest.json

  # ==========================================
  # MAVEN ARTIFACTS
  # ==========================================
  publish-commons-convention:
    name: Publish commons-convention
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'maven/commons-convention')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/java-task
        with:
          command: maven:publish
          task_env: |
            MODULE=commons-convention
            GITHUB_ACTOR=${{ github.actor }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

  publish-commons-firebase-admin:
    name: Publish commons-firebase-admin
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'maven/commons-firebase-admin')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/java-task
        with:
          command: maven:publish
          task_env: |
            MODULE=commons-firebase-admin
            GITHUB_ACTOR=${{ github.actor }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

  publish-commons-security:
    name: Publish commons-security
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'maven/commons-security')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/java-task
        with:
          command: maven:publish
          task_env: |
            MODULE=commons-security
            GITHUB_ACTOR=${{ github.actor }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

  publish-commons-test:
    name: Publish commons-test
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'maven/commons-test')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/java-task
        with:
          command: maven:publish
          task_env: |
            MODULE=commons-test
            GITHUB_ACTOR=${{ github.actor }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # NPM PACKAGES
  # ==========================================
  publish-commons-cloudflare:
    name: Publish commons-cloudflare
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-cloudflare')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/node-task
        with:
          command: npm:publish
          node_cache_path: npm/pnpm-lock.yaml
          task_env: |
            NODE_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
            PACKAGE='@aimarchirico/commons-cloudflare'

  publish-commons-docs:
    name: Publish commons-docs
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-docs')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/node-task
        with:
          command: npm:publish
          node_cache_path: npm/pnpm-lock.yaml
          task_env: |
            NODE_AUTH_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
            PACKAGE='@aimarchirico/commons-docs'

  publish-commons-expo:
    name: Publish commons-expo
    needs: release-please
    if: contains(fromJSON(needs.release-please.outputs.paths_released), 'npm/packages/commons-expo')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/node-task
