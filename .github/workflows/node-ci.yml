name: Node CI

on:
  workflow_call:
    inputs:
      command:
        type: string
        required: true
      node_cache_path:
        type: string
        default: 'pnpm-lock.yaml'
      working_directory:
        type: string
        default: '.'
    secrets:
      TASK_ENV:
        required: false

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ inputs.node_cache_path }}
          registry-url: https://npm.pkg.github.com

      - name: Set Up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.51.1

      - name: Run Task
        working-directory: ${{ inputs.working_directory }}
        run: |
          if [ -n "${{ secrets.TASK_ENV }}" ]; then
            echo "${{ secrets.TASK_ENV }}" > .env.temp
            source .env.temp
          fi
          task ${{ inputs.command }}
