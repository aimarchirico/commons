version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gradle"
    directory: "/maven"
    schedule:
      interval: "weekly"
  
  - package-ecosystem: "npm"
    directory: "/npm"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 1

  - package-ecosystem: "npm"
    directory: "/tools"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 1