version: '3'

tasks:
  install:
    internal: true
    desc: Install npm dependencies
    cmds:
      - pnpm install
    if: '[ -n "$CI" ]'

  docs:check:
    desc: Lint Markdown files
    cmds:
      - task: install
      - pnpm exec markdownlint-cli2

  docs:fix:
    desc: Fix Markdown issues
    cmds:
      - pnpm exec markdownlint-cli2 --fix

  commit:check:
    desc: Lint commit messages
    vars:
      EDIT:
        sh: |
          if [ -n "$EDIT_FILE" ]; then
            echo "--edit $EDIT_FILE"
          fi
      COMMIT_RANGE:
        sh: |
          if [ -n "$FROM_SHA" ] && [ -n "$TO_SHA" ]; then
            echo "--from $FROM_SHA --to $TO_SHA"
          fi
    cmds:
      - task: install
      - pnpm exec commitlint {{.COMMIT_RANGE}} {{.EDIT}}

  skills:
    cmds:
      - gh skill install aimarchirico/commons --all --scope project --agent antigravity
      - gh skill install aimarchirico/commons --all --scope project --agent claude-code

  root:check:
    desc: Lint global repository folders
    cmds:
      - pnpm exec eslint --config eslint.config.ts --no-error-on-unmatched-pattern "../.github/**/*" "../*" "../.vscode/**/*" "../*.yml" "../*.json" "../*.toml"

  root:fix:
    desc: Fix global repository folders lint issues
    cmds:
      - pnpm exec eslint --config eslint.config.ts --no-error-on-unmatched-pattern "../.github/**/*" "../*" "../.vscode/**/*" "../*.yml" "../*.json" "../*.toml" --fix

  shell:check:
    desc: Lint shell scripts
    dir: ..
    cmds:
      - 'git ls-files -z "*.sh" | xargs -0r shellcheck'

  python:check:
    desc: Lint Python scripts
    dir: ..
    cmds:
      - uvx ruff check .

  python:fix:
    desc: Fix Python scripts
    dir: ..
    cmds:
      - uvx ruff check --fix .
      - uvx ruff format .

  action:check:
    desc: Lint GitHub Actions
    dir: ..
    cmds:
      - actionlint -color

  docker:check:
    desc: Lint Dockerfiles
    dir: ..
    cmds:
      - 'git ls-files -z "*Dockerfile*" | xargs -0r hadolint'
