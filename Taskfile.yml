version: '3'

dotenv: ['.env']

includes:
  kotlin:
    taskfile: ./kotlin/Taskfile.yml
    dir: ./kotlin
  typescript:
    taskfile: ./typescript/Taskfile.yml
    dir: ./typescript
  docs:
    taskfile: ./node_modules/@aimarchirico/core-docs/Taskfile.yml
    dir: .

tasks:
  default:
    cmds:
      - task --list

  build:
    desc: Build the Kotlin modules
    cmds:
      - task: kotlin:build

  check:
    desc: Run all checks (modules, packages, and docs)
    cmds:
      - task: kotlin:check
      - task: typescript:check
      - task: docs:check

  fix:
    desc: Auto-fix formatting and linting issues
    cmds:
      - task: kotlin:fix
      - task: typescript:fix
      - task: docs:fix
