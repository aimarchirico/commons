version: '3'

dotenv: ['.env']

includes:
  kotlin:
    taskfile: ./kotlin/Taskfile.yml
    dir: ./kotlin
  typescript:
    taskfile: ./typescript/Taskfile.yml
    dir: ./typescript

tasks:
  default:
    cmds:
      - task --list

  build:
    desc: Build the Kotlin modules (automatically compiles build-logic)
    cmds:
      - task: kotlin:build

  check:
    desc: Run all checks (modules, packages, and docs)
    cmds:
      - task: "check:modules"
      - task: "check:packages"
      - task: "check:docs"

  "check:modules":
    desc: Run JVM and Gradle check tasks
    cmds:
      - task: kotlin:check

  "check:packages":
    desc: Run ESLint and TypeScript checks on packages
    cmds:
      - task: typescript:check

  "check:docs":
    desc: Lint Markdown documentation files
    cmds:
      - npx markdownlint-cli2

  fix:
    desc: Auto-fix formatting and linting issues (modules, packages, and docs)
    cmds:
      - task: "fix:modules"
      - task: "fix:packages"
      - task: "fix:docs"

  "fix:modules":
    desc: Format Kotlin code with ktfmt
    cmds:
      - task: kotlin:fix

  "fix:packages":
    desc: Auto-fix ESLint issues on packages
    cmds:
      - task: typescript:fix

  "fix:docs":
    desc: Auto-fix Markdown documentation linting issues
    cmds:
      - npx markdownlint-cli2 --fix
