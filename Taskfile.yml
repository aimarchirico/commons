version: '3'

dotenv: ['.env']

tasks:
  default:
    cmds:
      - task --list

  build:
    desc: Build the convention plugin and modules
    cmds:
      - bash modules/gradlew -p modules/build-logic build
      - bash modules/gradlew -p modules build

  check:
    desc: Run all checks (modules, packages, and docs)
    cmds:
      - task: check:modules
      - task: check:packages
      - task: check:docs

  "check:modules":
    desc: Run JVM and Gradle check tasks
    cmds:
      - bash modules/gradlew -p modules/build-logic check
      - bash modules/gradlew -p modules check

  "check:packages":
    desc: Run ESLint and TypeScript checks on packages
    cmds:
      - npx eslint
      - npx tsc

  "check:docs":
    desc: Lint Markdown documentation files
    cmds:
      - npx markdownlint-cli2

  fix:
    desc: Format Kotlin and auto-fix Markdown
    cmds:
      - bash modules/gradlew -p modules ktfmtFormat
      - npx markdownlint-cli2 --fix
      - npx eslint --fix
