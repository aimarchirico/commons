version: '3'

tasks:
  build:
    desc: Build the Kotlin modules (automatically compiles build-logic)
    cmds:
      - bash gradlew build

  check:
    desc: Run JVM and Gradle check tasks
    cmds:
      - bash gradlew check

  fix:
    desc: Format Kotlin code with ktfmt
    cmds:
      - bash gradlew ktfmtFormat
